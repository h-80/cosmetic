<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثة - متجر الفحام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --pink: #880e4f; --user-bg: #fff; --admin-bg: #f8bbd0; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: #f0f0f0; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        header { background: var(--pink); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; position: sticky; top: 0; z-index: 100; }

        /* منطقة الرسائل - الفقاعات */
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* رسالة المستخدم (أنت) */
        .msg.user { background: white; align-self: flex-start; border-bottom-left-radius: 2px; color: #333; }
        
        /* رسالة الإدارة */
        .msg.admin { background: #fce4ec; align-self: flex-end; border-bottom-right-radius: 2px; color: #333; border: 1px solid #f8bbd0; }

        /* منطقة الإدخال */
        .input-area { background: white; padding: 12px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 15px; }
        .input-area button { background: var(--pink); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .input-area button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<header>محادثة الدعم الفني</header>

<div id="chatBox">
    </div>

<div class="input-area">
    <input type="text" id="userMsg" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">✈</button>
</div>

<script>
    // تهيئة Firebase (تأكد من مطابقة نفس الرابط في لوحة التحكم)
    const firebaseConfig = { databaseURL: "https://cosmetic-1980-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب رقم هاتف المستخدم من AppCreator24 أو الذاكرة
    // ملاحظة: استبدل '077XXXXXXXX' بالطريقة التي تجلب بها رقم المستخدم في تطبيقك
    const userPhone = localStorage.getItem('userPhone') || "07700000000"; 

    // وظيفة تحميل المحادثة بالكامل
    function loadMessages() {
        const chatBox = document.getElementById('chatBox');
        
        // الاستماع لكل الرسائل في عقدة المستخدم
        db.ref('chats/' + userPhone).on('value', (snapshot) => {
            chatBox.innerHTML = ''; // تنظيف الصندوق قبل العرض
            
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // التأكد من جلب النص الصحيح وتجاهل البيانات غير النصية
                let messageText = "";
                if (typeof data === 'object') {
                    messageText = data.text || data.msg || "";
                } else if (typeof data === 'string' && data !== userPhone) {
                    messageText = data;
                }

                if (messageText && messageText !== "[object Object]") {
                    const div = document.createElement('div');
                    // إذا كان الـ role هو admin تظهر كرسالة إدارة، غير ذلك تظهر كرسالة مستخدم
                    const isFromAdmin = (data.role === 'admin');
                    div.className = `msg ${isFromAdmin ? 'admin' : 'user'}`;
                    div.innerText = messageText;
                    chatBox.appendChild(div);
                }
            });
            
            // التمرير لأسفل تلقائياً عند وصول رسالة جديدة
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    // وظيفة إرسال الرسالة
    function sendMessage() {
        const input = document.getElementById('userMsg');
        const text = input.value.trim();
        
        if (text === "") return;

        // إرسال الرسالة كـ Push لضمان عدم ضياع السجل القديم
        db.ref('chats/' + userPhone).push({
            role: 'user',   // نحدد أن المرسل هو المستخدم
            text: text,     // نص الرسالة
            time: Date.now()
        }).then(() => {
            input.value = ''; // مسح الحقل بعد الإرسال
        });
    }

    // بدء تشغيل جلب الرسائل عند فتح الصفحة
    loadMessages();
</script>

</body>
</html>
