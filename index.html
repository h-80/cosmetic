<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetic</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* عدت لنفس تنسيقاتك الأصلية دون أي زيادة */
        :root { --pink: #880e4f; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: #fff; margin: 0; padding-top: 60px; }
        header { background: #fff; padding: 10px; position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-info { padding: 8px; }
        
        /* شاشة التفاصيل الأصلية */
        #detailsScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; display: none; overflow-y: auto; }
        .det-img { width: 100%; height: 300px; object-fit: cover; }
        .det-body { padding: 20px; }
        
        /* أزرار التواصل كما طلبتها */
        .actions { position: fixed; bottom: 0; width: 100%; display: flex; padding: 10px; gap: 5px; background: #fff; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; text-align: center; text-decoration: none; color: #fff; font-weight: 700; font-size: 14px; border: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; color: var(--pink);">Cosmetic</div>
    <div onclick="location.href='profile.html'">👤 حسابي</div>
</header>

<div class="grid" id="mainGrid"></div>

<div id="detailsScreen">
    <button onclick="closeDet()" style="position:fixed; top:15px; right:15px; background:rgba(0,0,0,0.5); color:#fff; border:none; border-radius:50%; width:35px; height:35px;">✕</button>
    <img id="detImg" class="det-img">
    <div class="det-body">
        <div onclick="goProfile()" style="display:flex; align-items:center; margin-bottom:15px; background:#f9f9f9; padding:10px; border-radius:10px;">
            <img id="ownerImg" src="" style="width:40px; height:40px; border-radius:50%; margin-left:10px;">
            <div id="ownerName" style="font-weight:700;">صاحب المنتج</div>
        </div>
        <h2 id="detTitle"></h2>
        <div id="detPrice" style="color:var(--pink); font-weight:800; font-size:20px;"></div>
        <p id="detDesc"></p>
    </div>
    <div class="actions">
        <a id="linkWa" class="btn" style="background:#25d366;">واتساب</a>
        <a id="linkPh" class="btn" style="background:#007bff;">اتصال</a>
        <button id="btnChat" class="btn" style="background:var(--pink);">مراسلة</button>
    </div>
</div>

<script>
    const config = { databaseURL: "https://cosmetic-1980-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();
    let currentOwner = "";

    db.ref('products').on('value', s => {
        let h = '';
        s.forEach(c => {
            let p = c.val();
            h += `<div class="card" onclick="openDet('${c.key}')"><img src="${p.image}"><div class="card-info"><b>${p.title}</b><br><span style="color:var(--pink)">${p.price} IQD</span></div></div>`;
        });
        document.getElementById('mainGrid').innerHTML = h;
    });

    function openDet(id) {
        db.ref('products/'+id).once('value', s => {
            let p = s.val();
            currentOwner = p.owner;
            document.getElementById('detImg').src = p.image;
            document.getElementById('detTitle').innerText = p.title;
            document.getElementById('detPrice').innerText = p.price + " IQD";
            document.getElementById('detDesc').innerText = p.description;
            
            db.ref('users/'+p.owner).once('value', us => {
                let u = us.val() || {};
                document.getElementById('ownerName').innerText = u.name || "مستخدم";
                document.getElementById('ownerImg').src = u.img || "https://via.placeholder.com/40";
            });

            document.getElementById('linkWa').href = "https://wa.me/"+p.owner;
            document.getElementById('linkPh').href = "tel:"+p.owner;
            
            // تفعيل زر المراسلة
            document.getElementById('btnChat').onclick = () => {
                const my = localStorage.getItem('app_user_phone');
                if(my === p.owner) return;
                const cid = my < p.owner ? my+"_"+p.owner : p.owner+"_"+my;
                location.href = `chat.html?chatId=${cid}&receiver=${p.owner}`;
            };

            document.getElementById('detailsScreen').style.display = 'block';
        });
    }
    function closeDet() { document.getElementById('detailsScreen').style.display = 'none'; }
    function goProfile() { location.href = `profile.html?id=${currentOwner}`; }
</script>
</body>
</html>
